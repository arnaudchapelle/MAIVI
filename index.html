<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAIVI — Agenda complet</title>
  <meta name="theme-color" content="#7aaee7" />
  <style>
    :root{
      --bg-top:#ffffff;
      --bg-bottom:#79aee6;
      --ink:#2b5ca8;
      --ink-soft:rgba(43,92,168,.72);
      --agenda:#8fc7ff;
      --tasks:#9be8c8;
      --courses:#9ce3b2;
      --health:#ffd1c8;
      --messages:#d8b8ff;
      --profile:#f8e8a8;
      --add:#73d9ff;
      --glass:rgba(123,170,232,.14);
      --glass-line:rgba(255,255,255,.18);
      --shadow:0 14px 32px rgba(68,112,190,.12);
      --card:rgba(255,255,255,.12);
      --card-strong:rgba(255,255,255,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
      color:var(--ink);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    .page{
      position:fixed;
      inset:0;
      overflow:auto;
      padding:18px 20px 128px;
      scroll-behavior:smooth;
    }

    .wrap{width:min(100%,430px);margin:0 auto}

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      margin:0 0 10px;
    }
    .brand-lockup{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
    }
    .brand h1{
      margin:0;
      font-size:56px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-0.075em;
      color:#f6fbff;
      text-shadow:
        0 1px 0 rgba(255,255,255,.98),
        0 2px 0 rgba(191,220,249,.82),
        0 8px 20px rgba(72,122,198,.24);
    }
    .brand .sub{
      margin-top:4px;
      font-size:12px;
      letter-spacing:.22em;
      text-transform:lowercase;
      color:rgba(73,90,170,.92);
      font-weight:700;
      padding-left:3px;
    }

    .agenda-month-complete{margin-top:0}

    .agenda-topbar{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px
    }
    .agenda-big-title{font-size:34px;font-weight:900;color:rgba(43,82,154,.98);letter-spacing:-.04em;line-height:1}
    .agenda-big-year{margin-top:4px;font-size:14px;font-weight:700;color:rgba(63,98,160,.72)}
    .agenda-top-actions{display:flex;align-items:center;gap:8px;padding-top:4px}
    .agenda-round-btn{
      width:36px;height:36px;border:none;border-radius:50%;
      background:linear-gradient(180deg,rgba(240,213,198,.72),rgba(234,183,150,.72));color:#fff;font-size:20px;font-weight:900;cursor:pointer;
      box-shadow:0 4px 12px rgba(234,183,150,.2)
    }
    .agenda-round-btn.light{
      background:rgba(255,255,255,.18);color:rgba(63,98,160,.85);border:1px solid rgba(255,255,255,.45);box-shadow:none
    }

    .agenda-view-tabs{
      margin-top:10px;background:transparent;border-radius:12px;padding:0;display:flex;gap:6px
    }
    .agenda-tab{
      flex:1;padding:8px 0;border:none;border-radius:10px;background:rgba(255,255,255,.12);color:rgba(63,98,160,.72);
      font-size:11px;font-weight:800;cursor:pointer;backdrop-filter:blur(4px)
    }
    .agenda-tab.active{background:rgba(255,255,255,.34);color:rgba(43,82,154,.98);box-shadow:none}

    .agenda-filters{
      margin:12px 0 14px;display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;
      -webkit-overflow-scrolling:touch;scrollbar-width:none
    }
    .agenda-filters::-webkit-scrollbar{display:none}
    .agenda-filter-chip{
      border:none;white-space:nowrap;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.12);
      color:rgba(43,82,154,.82);font-size:12px;font-weight:800;cursor:pointer;box-shadow:none;backdrop-filter:blur(4px)
    }
    .agenda-filter-chip.active{background:rgba(255,255,255,.34);color:rgba(43,82,154,.98)}

    .view{display:none}
    .view.active{display:block}

    .month-shell,.week-shell,.planning-shell,.year-shell{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }

    .month-head,.week-head,.planning-head,.year-head{
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
      margin-bottom:12px;
    }

    .month-nav-btn{
      width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.38);
      color:rgba(63,98,160,.84);font-size:22px;cursor:pointer
    }

    .month-head-center,.week-head-center,.planning-head-center,.year-head-center{text-align:center}
    .month-label-m,.week-label-m,.planning-label-m,.year-label-m{
      font-size:24px;font-weight:900;color:rgba(43,82,154,.98);letter-spacing:-.03em
    }
    .month-label-y,.week-label-y,.planning-label-y,.year-label-y{
      margin-left:6px;font-size:16px;font-weight:700;color:rgba(63,98,160,.72)
    }

    .month-days-header,.month-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      text-align:center;
    }
    .month-days-header{margin-bottom:10px}
    .month-days-header div{font-size:13px;font-weight:800;color:rgba(66,104,174,.72)}
    .month-days-header .we{color:#D48747}
    .month-grid{row-gap:8px;column-gap:6px}

    .month-cell{
      min-height:64px;border-radius:14px;padding:6px 4px 4px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      position:relative;cursor:pointer;transition:transform .14s ease, box-shadow .14s ease;background:transparent
    }
    .month-cell:hover{transform:translateY(-1px)}
    .month-cell.muted{opacity:.3}
    .month-cell.today{outline:1px solid rgba(255,255,255,.55);outline-offset:1px}
    .month-cell.selected{background:linear-gradient(180deg,rgba(103,209,255,.45),rgba(42,149,255,.45));box-shadow:none}
    .month-cell.week-a{background-color:rgba(126,169,159,.08)}
    .month-cell.week-b{background-color:rgba(183,154,214,.08)}
    .month-cell.selected.week-a,.month-cell.selected.week-b{background:linear-gradient(180deg,rgba(103,209,255,.45),rgba(42,149,255,.45))}
    .month-day-number{font-size:15px;font-weight:800;color:rgba(43,82,154,.95);line-height:1.1}
    .month-cell.selected .month-day-number{color:#fff}
    .month-vac-label{margin-top:4px;font-size:9px;font-weight:900;color:#B77734;line-height:1}
    .month-cell.selected .month-vac-label{color:#fff7df}
    .month-dots{margin-top:6px;display:flex;align-items:center;justify-content:center;gap:4px;min-height:10px}
    .month-dots i{width:7px;height:7px;border-radius:50%;display:block;box-shadow:none}
    .month-more{margin-top:4px;font-size:9px;font-weight:900;color:rgba(43,82,154,.66)}
    .month-cell.selected .month-more{color:#fff}

    .selected-day-panel{
      margin-top:14px;background:transparent;border:none;
      border-radius:0;padding:0;backdrop-filter:none
    }
    .selected-day-title{font-size:16px;font-weight:900;color:rgba(43,82,154,.98);margin-bottom:12px}
    .selected-day-empty{font-size:14px;font-weight:700;color:rgba(63,98,160,.72)}
    .selected-day-event{
      display:grid;grid-template-columns:12px 58px 1fr auto;align-items:center;gap:10px;padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.18);cursor:pointer
    }
    .selected-day-event:last-child{border-bottom:none;padding-bottom:0}
    .selected-day-time{font-size:14px;font-weight:900;color:rgba(43,82,154,.95)}
    .selected-day-main{min-width:0}
    .selected-day-name{font-size:15px;font-weight:900;color:rgba(43,82,154,.98);line-height:1.15}
    .selected-day-meta{margin-top:3px;font-size:12px;font-weight:700;color:rgba(63,98,160,.72)}
    .selected-day-type{
      font-size:11px;font-weight:900;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.16);color:rgba(43,82,154,.82)
    }

    .agenda-legend{margin:12px 2px 0;display:flex;gap:12px;flex-wrap:wrap;font-size:10px;font-weight:800;color:rgba(63,98,160,.76)}
    .agenda-legend span{display:flex;align-items:center;gap:5px}
    .leg-box{width:12px;height:12px;border-radius:4px;display:inline-block}
    .leg-a{background:rgba(126,169,159,.25)}
    .leg-b{background:rgba(183,154,214,.25)}
    .leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .leg-vac{background:#EDB777}

    .week-grid{
      display:grid;
      grid-template-columns:70px repeat(7,1fr);
      gap:8px;
      align-items:start;
    }
    .week-days{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-bottom:10px;
      margin-left:78px;
    }
    .week-day-head{
      text-align:center;
      font-size:12px;
      font-weight:900;
      color:rgba(66,104,174,.75);
    }
    .week-day-head.active{color:#2a95ff}
    .week-time-col{display:grid;gap:8px}
    .week-time-slot{
      height:54px;
      font-size:11px;
      font-weight:800;
      color:rgba(66,104,174,.65);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:4px;
    }
    .week-col{display:grid;gap:8px}
    .week-cell{
      min-height:54px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      padding:4px;
      backdrop-filter:blur(4px)
    }
    .week-event{
      border-radius:12px;
      padding:8px 8px;
      color:#fff;
      font-size:11px;
      font-weight:800;
      line-height:1.2;
      margin-bottom:4px;
      cursor:pointer;
      box-shadow:none;
    }
    .week-event small{display:block;font-size:10px;opacity:.9;margin-top:2px;font-weight:700}

    .planning-list{display:grid;gap:10px}
    .planning-day{margin-bottom:8px}
    .planning-day-title{font-size:14px;font-weight:900;color:rgba(43,82,154,.95);margin:8px 0}
    .planning-event{
      display:grid;
      grid-template-columns:12px 58px 1fr auto;
      gap:10px;
      align-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:12px;
      margin-bottom:8px;
      cursor:pointer;
      backdrop-filter:blur(4px)
    }

    .year-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .mini-month{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      backdrop-filter:blur(4px)
    }
    .mini-month-title{
      text-align:center;
      font-size:14px;
      font-weight:900;
      color:rgba(43,82,154,.95);
      margin-bottom:8px;
      text-transform:capitalize;
    }
    .mini-weekdays,.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
    .mini-weekdays div{font-size:9px;font-weight:800;color:rgba(66,104,174,.6);margin-bottom:4px}
    .mini-grid{row-gap:4px;column-gap:2px}
    .mini-day{min-height:18px;font-size:10px;font-weight:800;color:rgba(43,82,154,.9);position:relative}
    .mini-day.muted{opacity:.28}
    .mini-day.has::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-1px;
      transform:translateX(-50%);
      width:4px;
      height:4px;
      border-radius:50%;
      background:#2a95ff;
    }

    .quick-title{margin:32px 0 18px;font-size:22px;color:rgba(255,255,255,.92);text-shadow:0 1px 8px rgba(74,114,190,.11)}
    .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .quick-item{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0;color:white}
    .quick-icon{
      width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:24px;
      background:rgba(255,255,255,.12);backdrop-filter:blur(10px);box-shadow:none;border:1px solid rgba(255,255,255,.16)
    }
    .quick-label{font-size:13px;font-weight:600;text-align:center;color:rgba(255,255,255,.94)}

    .nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:22px;width:min(92vw,430px);height:78px;border-radius:999px;
      background:var(--glass);backdrop-filter:blur(16px);box-shadow:var(--shadow), inset 0 1px 0 var(--glass-line);
      display:grid;grid-template-columns:repeat(5,1fr);align-items:end;padding:12px 14px 10px;z-index:60
    }
    .nav-item{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0;font:inherit}
    .nav-icon{font-size:27px;line-height:1;filter:drop-shadow(0 4px 8px rgba(73,114,191,.13))}
    .nav-label{font-size:12px;font-weight:600;letter-spacing:.01em}
    .nav-item.home{color:var(--profile)}
    .nav-item.agenda{color:var(--agenda)}
    .nav-item.add{color:#fff}
    .nav-item.messages{color:var(--messages)}
    .nav-item.profile{color:var(--health)}
    .nav-item.add .nav-icon{
      width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin-top:-18px;font-size:38px;
      background:radial-gradient(circle at 30% 25%, rgba(207,247,255,.72) 0%, rgba(137,224,255,.72) 40%, rgba(78,194,255,.72) 100%);
      box-shadow:0 12px 26px rgba(75,191,255,.18);border:2px solid rgba(255,255,255,.12)
    }

    .sheet-backdrop,.modal-bg,.detail-backdrop{
      position:fixed;inset:0;background:rgba(18,42,84,.14);backdrop-filter:blur(4px);
      opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:80
    }
    .sheet-backdrop.show,.modal-bg.show,.detail-backdrop.show{opacity:1;pointer-events:auto}

    .sheet,.detail-panel{
      position:fixed;left:50%;bottom:-100%;transform:translateX(-50%);
      width:min(94vw,440px);max-height:72vh;overflow:auto;border-radius:28px 28px 0 0;
      background:rgba(255,255,255,.18);backdrop-filter:blur(22px);
      box-shadow:0 -18px 40px rgba(45,82,154,.12), inset 0 1px 0 rgba(255,255,255,.16);
      padding:18px 18px 24px;transition:bottom .25s ease;z-index:90
    }
    .sheet.show,.detail-panel

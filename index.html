<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAIVI — Home V2</title>
  <style>
    :root{
      --bg-top:#ffffff;
      --bg-bottom:#79aee6;

      --ink:#2b5ca8;
      --ink-soft:rgba(43,92,168,.72);
      --white:rgba(255,255,255,.96);

      --agenda:#8fc7ff;
      --tasks:#9be8c8;
      --courses:#9ce3b2;
      --health:#ffd1c8;
      --messages:#d8b8ff;
      --profile:#f8e8a8;
      --add:#73d9ff;

      --glass:rgba(123,170,232,.18);
      --glass-line:rgba(255,255,255,.22);
      --shadow:0 14px 32px rgba(68,112,190,.16);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
      color:var(--ink);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    .page{
      position:fixed;
      inset:0;
      overflow:auto;
      padding:28px 20px 128px;
    }

    .wrap{
      width:min(100%,430px);
      margin:0 auto;
    }

    /* HEADER */
    .brand{
      text-align:center;
      margin-top:4px;
    }

    .brand h1{
      margin:0;
      font-size:76px;
      line-height:1;
      font-weight:900;
      letter-spacing:-0.07em;
      color:#e8f4ff;
      text-shadow:
        0 1px 0 rgba(255,255,255,.95),
        0 3px 0 rgba(139,188,240,.45),
        0 12px 26px rgba(67,120,202,.18);
    }

    .brand .sub{
      margin-top:8px;
      font-size:16px;
      letter-spacing:.22em;
      text-transform:lowercase;
      color:rgba(88,84,180,.88);
      font-weight:600;
    }

    .hello{
      text-align:center;
      margin:34px 0 28px;
    }

    .hello h2{
      margin:0;
      font-size:30px;
      font-weight:700;
      letter-spacing:-.03em;
      color:rgba(42,82,154,.98);
    }

    .hello p{
      margin:10px 0 0;
      font-size:19px;
      color:var(--ink-soft);
    }

    /* CALENDAR */
    .calendar-shell{
      margin-top:14px;
    }

    .calendar-head{
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
      margin-bottom:14px;
      color:rgba(49,91,165,.86);
    }

    .calendar-head button{
      border:none;
      background:none;
      color:inherit;
      font-size:46px;
      line-height:1;
      cursor:pointer;
      padding:0;
    }

    .calendar-month{
      text-align:center;
      font-size:30px;
      font-weight:700;
      letter-spacing:-.03em;
      text-transform:capitalize;
    }

    .weekdays,
    .days-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      text-align:center;
    }

    .weekdays{
      margin-bottom:10px;
    }

    .weekdays div{
      font-size:16px;
      font-weight:500;
      color:rgba(66,104,174,.74);
    }

    .days-grid{
      row-gap:18px;
      column-gap:2px;
      margin-bottom:34px;
    }

    .day{
      min-height:44px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:18px;
      font-weight:500;
      color:rgba(45,85,163,.9);
      cursor:pointer;
      user-select:none;
    }

    .day.muted{
      opacity:.38;
    }

    .day.selected{
      color:white;
      font-weight:700;
    }

    .day.selected::before{
      content:"";
      position:absolute;
      width:50px;
      height:50px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 25%, #b8efff 0%, #68d1ff 44%, #2995ff 100%);
      box-shadow:0 12px 26px rgba(41,149,255,.24);
      z-index:-1;
    }

    .day-dots{
      position:absolute;
      bottom:-8px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:4px;
    }

    .day-dots i{
      width:8px;
      height:8px;
      border-radius:50%;
      display:block;
      box-shadow:0 3px 8px rgba(0,0,0,.06);
    }

    /* EVENTS */
    .section-title{
      margin:0 0 18px;
      font-size:28px;
      letter-spacing:-.03em;
      color:rgba(255,255,255,.96);
      text-shadow:0 1px 10px rgba(73,114,190,.13);
    }

    .events{
      display:grid;
      gap:18px;
    }

    .event{
      display:grid;
      grid-template-columns:14px 58px 1fr;
      align-items:center;
      gap:14px;
      color:rgba(255,255,255,.97);
      text-shadow:0 1px 8px rgba(74,114,190,.11);
    }

    .event .time{
      font-size:20px;
      font-weight:500;
    }

    .event .text{
      font-size:21px;
      font-weight:500;
      line-height:1.15;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      display:inline-block;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
    }

    /* QUICK ACCESS */
    .quick-title{
      margin:42px 0 18px;
      font-size:22px;
      color:rgba(255,255,255,.92);
      text-shadow:0 1px 8px rgba(74,114,190,.11);
    }

    .quick-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }

    .quick-item{
      border:none;
      background:none;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      padding:0;
      color:white;
    }

    .quick-icon{
      width:54px;
      height:54px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:24px;
      background:rgba(255,255,255,.14);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 20px rgba(72,116,190,.12);
    }

    .quick-label{
      font-size:13px;
      font-weight:600;
      text-align:center;
      color:rgba(255,255,255,.94);
    }

    /* BOTTOM NAV */
    .nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:22px;
      width:min(92vw,430px);
      height:78px;
      border-radius:999px;
      background:var(--glass);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow), inset 0 1px 0 var(--glass-line);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      align-items:end;
      padding:12px 14px 10px;
      z-index:60;
    }

    .nav-item{
      border:none;
      background:none;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      padding:0;
      font:inherit;
    }

    .nav-icon{
      font-size:27px;
      line-height:1;
      filter:drop-shadow(0 4px 8px rgba(73,114,191,.13));
    }

    .nav-label{
      font-size:12px;
      font-weight:600;
      letter-spacing:.01em;
    }

    .nav-item.home{color:var(--profile)}
    .nav-item.agenda{color:var(--agenda)}
    .nav-item.add{color:#fff}
    .nav-item.messages{color:var(--messages)}
    .nav-item.profile{color:var(--health)}

    .nav-item.add .nav-icon{
      width:64px;
      height:64px;
      border-radius:50%;
      display:grid;
      place-items:center;
      margin-top:-18px;
      font-size:38px;
      background:radial-gradient(circle at 30% 25%, #cff7ff 0%, #89e0ff 40%, #4ec2ff 100%);
      box-shadow:0 12px 26px rgba(75,191,255,.28);
      border:2px solid rgba(255,255,255,.16);
    }

    .empty{
      color:rgba(255,255,255,.9);
      font-size:18px;
    }

    @media (max-width:420px){
      .page{padding:24px 18px 122px}
      .brand h1{font-size:64px}
      .brand .sub{font-size:14px}
      .hello h2{font-size:28px}
      .hello p{font-size:18px}
      .calendar-month{font-size:27px}
      .section-title{font-size:25px}
      .event .time{font-size:18px}
      .event .text{font-size:19px}
      .quick-grid{gap:10px}
      .quick-label{font-size:12px}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <div class="brand">
        <h1>MAIVI</h1>
        <div class="sub">homelife</div>
      </div>

      <section class="hello">
        <h2>Bonjour Léo</h2>
        <p id="moodText">Aujourd’hui est calme</p>
      </section>

      <section class="calendar-shell">
        <div class="calendar-head">
          <button id="prevMonth">‹</button>
          <div class="calendar-month" id="monthLabel">Avril 2024</div>
          <button id="nextMonth">›</button>
        </div>

        <div class="weekdays">
          <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
        </div>

        <div class="days-grid" id="calendarGrid"></div>
      </section>

      <section>
        <h3 class="section-title">Aujourd’hui</h3>
        <div class="events" id="eventsList"></div>
      </section>

      <section>
        <h4 class="quick-title">Accès rapides</h4>
        <div class="quick-grid">
          <button class="quick-item">
            <div class="quick-icon" style="color:var(--tasks)">✓</div>
            <div class="quick-label">Tâches</div>
          </button>
          <button class="quick-item">
            <div class="quick-icon" style="color:var(--courses)">🛒</div>
            <div class="quick-label">Courses</div>
          </button>
          <button class="quick-item">
            <div class="quick-icon" style="color:var(--health)">♡</div>
            <div class="quick-label">Santé</div>
          </button>
          <button class="quick-item">
            <div class="quick-icon" style="color:var(--messages)">💬</div>
            <div class="quick-label">Messages</div>
          </button>
        </div>
      </section>
    </div>
  </main>

  <nav class="nav">
    <button class="nav-item home">
      <div class="nav-icon">⌂</div>
      <div class="nav-label">Accueil</div>
    </button>
    <button class="nav-item agenda">
      <div class="nav-icon">◫</div>
      <div class="nav-label">Agenda</div>
    </button>
    <button class="nav-item add">
      <div class="nav-icon">＋</div>
      <div class="nav-label">Ajouter</div>
    </button>
    <button class="nav-item messages">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Messages</div>
    </button>
    <button class="nav-item profile">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profil</div>
    </button>
  </nav>

  <script>
    const state = {
      selectedDate: "2024-04-24",
      events: [
        { date:"2024-04-24", time:"14:00", title:"Shooting mariage", color:"#f7e7a8" },
        { date:"2024-04-24", time:"16:00", title:"Appel client", color:"#9ee9c8" },
        { date:"2024-04-24", time:"19:00", title:"Dîner famille", color:"#73d7ff" },
        { date:"2024-04-25", time:"09:00", title:"Vétérinaire", color:"#ffbdb7" },
        { date:"2024-04-12", time:"11:00", title:"Message école", color:"#d7b5ff" },
        { date:"2024-04-26", time:"18:30", title:"Courses", color:"#9ce3b2" },
        { date:"2024-04-17", time:"13:00", title:"Déjeuner famille", color:"#f7e7a8" },
        { date:"2024-04-29", time:"10:30", title:"Pharmacie", color:"#9ee9c8" }
      ]
    };

    let currentMonth = new Date(state.selectedDate + "T12:00:00");

    const monthLabel = document.getElementById("monthLabel");
    const calendarGrid = document.getElementById("calendarGrid");
    const eventsList = document.getElementById("eventsList");
    const moodText = document.getElementById("moodText");

    function formatTime(time){
      return time.replace(":", "h");
    }

    function renderCalendar(){
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();

      monthLabel.textContent = currentMonth.toLocaleDateString("fr-FR", {
        month:"long",
        year:"numeric"
      });

      const firstDay = new Date(year, month, 1);
      let offset = firstDay.getDay();
      offset = offset === 0 ? 6 : offset - 1;

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();

      const cells = [];

      for(let i = 0; i < offset; i++){
        cells.push({
          day: prevMonthDays - offset + 1 + i,
          muted: true,
          date: null
        });
      }

      for(let d = 1; d <= daysInMonth; d++){
        const dateStr = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        cells.push({
          day: d,
          muted: false,
          date: dateStr
        });
      }

      while(cells.length % 7 !== 0){
        cells.push({
          day: cells.length - (offset + daysInMonth) + 1,
          muted: true,
          date: null
        });
      }

      calendarGrid.innerHTML = cells.map(cell => {
        const selected = cell.date === state.selectedDate;
        const dayEvents = cell.date ? state.events.filter(e => e.date === cell.date).slice(0,3) : [];

        return `
          <div class="day ${cell.muted ? "muted" : ""} ${selected ? "selected" : ""}" ${cell.date ? `data-date="${cell.date}"` : ""}>
            <span>${cell.day}</span>
            ${dayEvents.length ? `
              <div class="day-dots">
                ${dayEvents.map(e => `<i style="background:${e.color}"></i>`).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }).join("");

      calendarGrid.querySelectorAll(".day[data-date]").forEach(el => {
        el.addEventListener("click", () => {
          state.selectedDate = el.dataset.date;
          renderCalendar();
          renderEvents();
        });
      });
    }

    function renderEvents(){
      const dayEvents = state.events
        .filter(e => e.date === state.selectedDate)
        .sort((a,b) => a.time.localeCompare(b.time));

      eventsList.innerHTML = dayEvents.map(e => `
        <div class="event">
          <span class="dot" style="background:${e.color}"></span>
          <span class="time">${formatTime(e.time)}</span>
          <span class="text">${e.title}</span>
        </div>
      `).join("");

      if(!dayEvents.length){
        eventsList.innerHTML = `<div class="empty">Aucun rendez-vous pour ce jour</div>`;
      }

      if(dayEvents.length === 0) moodText.textContent = "Aujourd’hui est calme";
      else if(dayEvents.length >= 4) moodText.textContent = "Aujourd’hui est chargé";
      else moodText.textContent = "Aujourd’hui est fluide";
    }

    document.getElementById("prevMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
      renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
      renderCalendar();
    });

    renderCalendar();
    renderEvents();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAIVI — Agenda complet</title>
  <meta name="theme-color" content="#7aaee7" />
  <style>
    :root{
      --bg-top:#ffffff;
      --bg-bottom:#79aee6;
      --ink:#2b5ca8;
      --ink-soft:rgba(43,92,168,.72);
      --agenda:#8fc7ff;
      --tasks:#9be8c8;
      --courses:#9ce3b2;
      --health:#ffd1c8;
      --messages:#d8b8ff;
      --profile:#f8e8a8;
      --add:#73d9ff;
      --glass:rgba(123,170,232,.14);
      --glass-line:rgba(255,255,255,.18);
      --shadow:0 14px 32px rgba(68,112,190,.12);
      --card:rgba(255,255,255,.12);
      --card-strong:rgba(255,255,255,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
      color:var(--ink);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    .page{
      position:fixed;
      inset:0;
      overflow:auto;
      padding:18px 20px 128px;
      scroll-behavior:smooth;
    }

    .wrap{width:min(100%,430px);margin:0 auto}

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      margin:0 0 10px;
    }
    .brand-lockup{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
    }
    .brand h1{
      margin:0;
      font-size:56px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-0.075em;
      color:#f6fbff;
      text-shadow:
        0 1px 0 rgba(255,255,255,.98),
        0 2px 0 rgba(191,220,249,.82),
        0 8px 20px rgba(72,122,198,.24);
    }
    .brand .sub{
      margin-top:4px;
      font-size:12px;
      letter-spacing:.22em;
      text-transform:lowercase;
      color:rgba(73,90,170,.92);
      font-weight:700;
      padding-left:3px;
    }

    .agenda-month-complete{margin-top:0}

    .agenda-topbar{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px
    }
    .agenda-big-title{font-size:34px;font-weight:900;color:rgba(43,82,154,.98);letter-spacing:-.04em;line-height:1}
    .agenda-big-year{margin-top:4px;font-size:14px;font-weight:700;color:rgba(63,98,160,.72)}
    .agenda-top-actions{display:flex;align-items:center;gap:8px;padding-top:4px}
    .agenda-round-btn{
      width:36px;height:36px;border:none;border-radius:50%;
      background:linear-gradient(180deg,rgba(240,213,198,.72),rgba(234,183,150,.72));color:#fff;font-size:20px;font-weight:900;cursor:pointer;
      box-shadow:0 4px 12px rgba(234,183,150,.2)
    }
    .agenda-round-btn.light{
      background:rgba(255,255,255,.18);color:rgba(63,98,160,.85);border:1px solid rgba(255,255,255,.45);box-shadow:none
    }

    .agenda-view-tabs{
      margin-top:10px;background:transparent;border-radius:12px;padding:0;display:flex;gap:6px
    }
    .agenda-tab{
      flex:1;padding:8px 0;border:none;border-radius:10px;background:rgba(255,255,255,.12);color:rgba(63,98,160,.72);
      font-size:11px;font-weight:800;cursor:pointer;backdrop-filter:blur(4px)
    }
    .agenda-tab.active{background:rgba(255,255,255,.34);color:rgba(43,82,154,.98);box-shadow:none}

    .agenda-filters{
      margin:12px 0 14px;display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;
      -webkit-overflow-scrolling:touch;scrollbar-width:none
    }
    .agenda-filters::-webkit-scrollbar{display:none}
    .agenda-filter-chip{
      border:none;white-space:nowrap;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.12);
      color:rgba(43,82,154,.82);font-size:12px;font-weight:800;cursor:pointer;box-shadow:none;backdrop-filter:blur(4px)
    }
    .agenda-filter-chip.active{background:rgba(255,255,255,.34);color:rgba(43,82,154,.98)}

    .view{display:none}
    .view.active{display:block}

    .month-shell,.week-shell,.planning-shell,.year-shell{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }

    .month-head,.week-head,.planning-head,.year-head{
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
      margin-bottom:12px;
    }

    .month-nav-btn{
      width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.38);
      color:rgba(63,98,160,.84);font-size:22px;cursor:pointer
    }

    .month-head-center,.week-head-center,.planning-head-center,.year-head-center{text-align:center}
    .month-label-m,.week-label-m,.planning-label-m,.year-label-m{
      font-size:24px;font-weight:900;color:rgba(43,82,154,.98);letter-spacing:-.03em
    }
    .month-label-y,.week-label-y,.planning-label-y,.year-label-y{
      margin-left:6px;font-size:16px;font-weight:700;color:rgba(63,98,160,.72)
    }

    .month-days-header,.month-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      text-align:center;
    }
    .month-days-header{margin-bottom:10px}
    .month-days-header div{font-size:13px;font-weight:800;color:rgba(66,104,174,.72)}
    .month-days-header .we{color:#D48747}
    .month-grid{row-gap:8px;column-gap:6px}

    .month-cell{
      min-height:64px;border-radius:14px;padding:6px 4px 4px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      position:relative;cursor:pointer;transition:transform .14s ease, box-shadow .14s ease;background:transparent
    }
    .month-cell:hover{transform:translateY(-1px)}
    .month-cell.muted{opacity:.3}
    .month-cell.today{outline:1px solid rgba(255,255,255,.55);outline-offset:1px}
    .month-cell.selected{background:linear-gradient(180deg,rgba(103,209,255,.45),rgba(42,149,255,.45));box-shadow:none}
    .month-cell.week-a{background-color:rgba(126,169,159,.08)}
    .month-cell.week-b{background-color:rgba(183,154,214,.08)}
    .month-cell.selected.week-a,.month-cell.selected.week-b{background:linear-gradient(180deg,rgba(103,209,255,.45),rgba(42,149,255,.45))}
    .month-day-number{font-size:15px;font-weight:800;color:rgba(43,82,154,.95);line-height:1.1}
    .month-cell.selected .month-day-number{color:#fff}
    .month-vac-label{margin-top:4px;font-size:9px;font-weight:900;color:#B77734;line-height:1}
    .month-cell.selected .month-vac-label{color:#fff7df}
    .month-dots{margin-top:6px;display:flex;align-items:center;justify-content:center;gap:4px;min-height:10px}
    .month-dots i{width:7px;height:7px;border-radius:50%;display:block;box-shadow:none}
    .month-more{margin-top:4px;font-size:9px;font-weight:900;color:rgba(43,82,154,.66)}
    .month-cell.selected .month-more{color:#fff}

    .selected-day-panel{
      margin-top:14px;background:transparent;border:none;
      border-radius:0;padding:0;backdrop-filter:none
    }
    .selected-day-title{font-size:16px;font-weight:900;color:rgba(43,82,154,.98);margin-bottom:12px}
    .selected-day-empty{font-size:14px;font-weight:700;color:rgba(63,98,160,.72)}
    .selected-day-event{
      display:grid;grid-template-columns:12px 58px 1fr auto;align-items:center;gap:10px;padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.18);cursor:pointer
    }
    .selected-day-event:last-child{border-bottom:none;padding-bottom:0}
    .selected-day-time{font-size:14px;font-weight:900;color:rgba(43,82,154,.95)}
    .selected-day-main{min-width:0}
    .selected-day-name{font-size:15px;font-weight:900;color:rgba(43,82,154,.98);line-height:1.15}
    .selected-day-meta{margin-top:3px;font-size:12px;font-weight:700;color:rgba(63,98,160,.72)}
    .selected-day-type{
      font-size:11px;font-weight:900;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.16);color:rgba(43,82,154,.82)
    }

    .agenda-legend{margin:12px 2px 0;display:flex;gap:12px;flex-wrap:wrap;font-size:10px;font-weight:800;color:rgba(63,98,160,.76)}
    .agenda-legend span{display:flex;align-items:center;gap:5px}
    .leg-box{width:12px;height:12px;border-radius:4px;display:inline-block}
    .leg-a{background:rgba(126,169,159,.25)}
    .leg-b{background:rgba(183,154,214,.25)}
    .leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .leg-vac{background:#EDB777}

    .week-grid{
      display:grid;
      grid-template-columns:70px repeat(7,1fr);
      gap:8px;
      align-items:start;
    }
    .week-days{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-bottom:10px;
      margin-left:78px;
    }
    .week-day-head{
      text-align:center;
      font-size:12px;
      font-weight:900;
      color:rgba(66,104,174,.75);
    }
    .week-day-head.active{color:#2a95ff}
    .week-time-col{display:grid;gap:8px}
    .week-time-slot{
      height:54px;
      font-size:11px;
      font-weight:800;
      color:rgba(66,104,174,.65);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:4px;
    }
    .week-col{display:grid;gap:8px}
    .week-cell{
      min-height:54px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      padding:4px;
      backdrop-filter:blur(4px)
    }
    .week-event{
      border-radius:12px;
      padding:8px 8px;
      color:#fff;
      font-size:11px;
      font-weight:800;
      line-height:1.2;
      margin-bottom:4px;
      cursor:pointer;
      box-shadow:none;
    }
    .week-event small{display:block;font-size:10px;opacity:.9;margin-top:2px;font-weight:700}

    .planning-list{display:grid;gap:10px}
    .planning-day{margin-bottom:8px}
    .planning-day-title{font-size:14px;font-weight:900;color:rgba(43,82,154,.95);margin:8px 0}
    .planning-event{
      display:grid;
      grid-template-columns:12px 58px 1fr auto;
      gap:10px;
      align-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:12px;
      margin-bottom:8px;
      cursor:pointer;
      backdrop-filter:blur(4px)
    }

    .year-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .mini-month{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      backdrop-filter:blur(4px)
    }
    .mini-month-title{
      text-align:center;
      font-size:14px;
      font-weight:900;
      color:rgba(43,82,154,.95);
      margin-bottom:8px;
      text-transform:capitalize;
    }
    .mini-weekdays,.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
    .mini-weekdays div{font-size:9px;font-weight:800;color:rgba(66,104,174,.6);margin-bottom:4px}
    .mini-grid{row-gap:4px;column-gap:2px}
    .mini-day{min-height:18px;font-size:10px;font-weight:800;color:rgba(43,82,154,.9);position:relative}
    .mini-day.muted{opacity:.28}
    .mini-day.has::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-1px;
      transform:translateX(-50%);
      width:4px;
      height:4px;
      border-radius:50%;
      background:#2a95ff;
    }

    .quick-title{margin:32px 0 18px;font-size:22px;color:rgba(255,255,255,.92);text-shadow:0 1px 8px rgba(74,114,190,.11)}
    .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .quick-item{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0;color:white}
    .quick-icon{
      width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:24px;
      background:rgba(255,255,255,.12);backdrop-filter:blur(10px);box-shadow:none;border:1px solid rgba(255,255,255,.16)
    }
    .quick-label{font-size:13px;font-weight:600;text-align:center;color:rgba(255,255,255,.94)}

    .nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:22px;width:min(92vw,430px);height:78px;border-radius:999px;
      background:var(--glass);backdrop-filter:blur(16px);box-shadow:var(--shadow), inset 0 1px 0 var(--glass-line);
      display:grid;grid-template-columns:repeat(5,1fr);align-items:end;padding:12px 14px 10px;z-index:60
    }
    .nav-item{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0;font:inherit}
    .nav-icon{font-size:27px;line-height:1;filter:drop-shadow(0 4px 8px rgba(73,114,191,.13))}
    .nav-label{font-size:12px;font-weight:600;letter-spacing:.01em}
    .nav-item.home{color:var(--profile)}
    .nav-item.agenda{color:var(--agenda)}
    .nav-item.add{color:#fff}
    .nav-item.messages{color:var(--messages)}
    .nav-item.profile{color:var(--health)}
    .nav-item.add .nav-icon{
      width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin-top:-18px;font-size:38px;
      background:radial-gradient(circle at 30% 25%, rgba(207,247,255,.72) 0%, rgba(137,224,255,.72) 40%, rgba(78,194,255,.72) 100%);
      box-shadow:0 12px 26px rgba(75,191,255,.18);border:2px solid rgba(255,255,255,.12)
    }

    .sheet-backdrop,.modal-bg,.detail-backdrop{
      position:fixed;inset:0;background:rgba(18,42,84,.14);backdrop-filter:blur(4px);
      opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:80
    }
    .sheet-backdrop.show,.modal-bg.show,.detail-backdrop.show{opacity:1;pointer-events:auto}

    .sheet,.detail-panel{
      position:fixed;left:50%;bottom:-100%;transform:translateX(-50%);
      width:min(94vw,440px);max-height:72vh;overflow:auto;border-radius:28px 28px 0 0;
      background:rgba(255,255,255,.18);backdrop-filter:blur(22px);
      box-shadow:0 -18px 40px rgba(45,82,154,.12), inset 0 1px 0 rgba(255,255,255,.16);
      padding:18px 18px 24px;transition:bottom .25s ease;z-index:90
    }
    .sheet.show,.detail-panel.show{bottom:0}
    .sheet-handle,.ev-handle,.detail-handle{width:48px;height:5px;border-radius:999px;background:rgba(255,255,255,.6);margin:0 auto 16px}
    .sheet-head,.detail-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .sheet-title,.detail-title{font-size:24px;font-weight:700;color:rgba(39,77,146,.98);letter-spacing:-.03em}
    .sheet-close,.detail-close{border:none;background:none;font-size:28px;color:rgba(39,77,146,.72);cursor:pointer}
    .sheet-list{display:grid;gap:14px}
    .sheet-row{display:grid;grid-template-columns:16px 1fr auto;gap:12px;align-items:center;color:rgba(39,77,146,.94)}
    .sheet-main{font-size:18px;font-weight:600}
    .sheet-sub{font-size:14px;color:rgba(39,77,146,.68);margin-top:4px}
    .sheet-tag{font-size:13px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.18);color:rgba(39,77,146,.86)}
    .sheet-actions{display:grid;gap:10px;margin-top:10px}
    .sheet-btn,.detail-btn{
      border:none;border-radius:18px;padding:14px 16px;background:rgba(255,255,255,.18);color:rgba(39,77,146,.96);
      font-size:17px;font-weight:600;cursor:pointer;text-align:left;box-shadow:none
    }
    .check-btn{
      width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(39,77,146,.28);
      background:rgba(255,255,255,.22);display:grid;place-items:center;cursor:pointer;color:#37b56a
    }
    .check-btn.done{background:rgba(255,255,255,.42)}

    .detail-content{display:grid;gap:12px}
    .detail-block{background:rgba(255,255,255,.16);border-radius:18px;padding:14px}
    .detail-k{font-size:11px;font-weight:900;letter-spacing:.06em;color:rgba(63,98,160,.72);margin-bottom:6px}
    .detail-v{font-size:16px;font-weight:800;color:rgba(39,77,146,.96);line-height:1.3}
    .detail-actions{display:grid;gap:10px;margin-top:10px}
    .detail-btn.delete{background:rgba(255,212,212,.38);color:#a84242}

    .modal-bg{z-index:120}
    .ev-modal{
      position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:min(94vw,460px);max-height:88vh;
      background:rgba(255,255,255,.52);backdrop-filter:blur(22px);border-radius:28px 28px 0 0;overflow:hidden;
      box-shadow:0 -18px 40px rgba(45,82,154,.12)
    }
    .ev-header{padding:12px 14px 14px;background:linear-gradient(135deg,rgba(126,169,159,.7),rgba(169,203,195,.7))}
    .ev-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .ev-type-btn{border:none;border-radius:14px;padding:10px 8px;background:rgba(255,255,255,.16);color:white;font-size:12px;font-weight:800;cursor:pointer}
    .ev-type-btn.active{background:rgba(255,255,255,.64);color:rgba(43,82,154,.98)}
    .ev-body{padding:18px 16px 10px;overflow:auto;max-height:calc(88vh - 170px)}
    .ev-title-input{
      width:100%;border:none;outline:none;background:rgba(255,255,255,.42);border-radius:18px;padding:16px 16px;
      font-size:20px;font-weight:800;color:rgba(43,82,154,.98);box-shadow:none;margin-bottom:14px
    }
    .ev-date-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .ev-date-block{background:rgba(255,255,255,.24);border-radius:18px;padding:12px}
    .ev-date-label,.ev-section-label{font-size:11px;font-weight:900;letter-spacing:.06em;color:rgba(63,98,160,.72)}
    .ev-date-input,.ev-time-input,.ev-recur-select{
      width:100%;border:none;outline:none;background:transparent;color:rgba(43,82,154,.98);font-size:15px;font-weight:700;margin-top:4px;font-family:inherit
    }
    .ev-sep{height:.5px;background:rgba(47,65,75,.12);margin:6px 0}
    .ev-section{background:rgba(255,255,255,.18);border-radius:18px;padding:12px;margin-bottom:12px}
    .ev-member-chips{display:flex;gap:8px;overflow:auto;padding-top:8px;scrollbar-width:none}
    .ev-member-chips::-webkit-scrollbar{display:none}
    .ev-chip{border:none;white-space:nowrap;padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.32);color:rgba(43,82,154,.82);font-size:12px;font-weight:800;cursor:pointer}
    .ev-chip.sel{background:rgba(43,82,154,.82);color:white}
    .ev-notes-input{
      width:100%;border:none;outline:none;background:rgba(255,255,255,.32);color:rgba(43,82,154,.96);font-size:14px;font-weight:700;
      border-radius:14px;padding:12px;margin-top:8px;min-height:90px;resize:vertical;font-family:inherit
    }
    .maps-link{font-size:12px;font-weight:800;color:#2D9E8E;text-decoration:none;display:flex;align-items:center;gap:6px}
    .maps-dot{width:18px;height:18px;background:#2D9E8E;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:10px}
    .ev-footer{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.12)}
    .ev-save-btn{
      width:100%;border:none;border-radius:18px;padding:14px 16px;background:linear-gradient(135deg,rgba(126,169,159,.72),rgba(169,203,195,.72));
      color:white;font-size:16px;font-weight:900;cursor:pointer;box-shadow:none
    }
    .ev-cancel-link{display:block;text-align:center;margin-top:10px;font-size:13px;font-weight:800;color:rgba(63,98,160,.76);cursor:pointer}

    .dot{width:10px;height:10px;border-radius:50%;display:inline-block}

    @media (max-width:420px){
      .page{padding:16px 18px 122px}
      .brand h1{font-size:48px}
      .brand .sub{font-size:11px}
      .quick-grid{gap:10px}
      .quick-label{font-size:12px}
      .agenda-big-title{font-size:30px}
      .month-label-m,.week-label-m,.planning-label-m,.year-label-m{font-size:22px}
      .week-grid{grid-template-columns:56px repeat(7,1fr)}
      .week-days{margin-left:64px}
      .week-time-slot{font-size:10px}
    }
  </style>
</head>
<body>
  <main class="page" id="homeTop">
    <div class="wrap">
      <div class="brand">
        <div class="brand-lockup">
          <h1>MAIVI</h1>
          <div class="sub">homelife</div>
        </div>
      </div>

      <section class="agenda-month-complete" id="agendaMonthComplete">
        <div class="agenda-topbar">
          <div>
            <div class="agenda-big-title" id="agendaBigMonth">Avril</div>
            <div class="agenda-big-year" id="agendaBigYear">2026</div>
          </div>

  <script>
    const storeKey = "maivi-agenda-complet-v2";

    const defaults = {

        { id: 5, title:"Courses", date:"2026-04-26", time:"18:30", date_fin:"2026-04-26", heure_fin:"19:30", color:"#9ce3b2", place:"Supermarché", type:"normal", membre_id:"julie", recurrence:"weekly", recurrence_end:"2026-07-01", notes:"" },
        { id: 6, title:"Garde papa", date:"2026-04-20", time:"08:00", date_fin:"2026-04-20", heure_fin:"20:00", color:"#2D9E8E", place:"", type:"garde_papa", membre_id:"emma", recurrence:"biweekly_b", recurrence_end:"2026-10-01", notes:"" },
        { id: 7, title:"Portrait studio", date:"2026-04-17", time:"13:00", date_fin:"2026-04-17", heure_fin:"15:00", color:"#6B8FA3", place:"Studio", type:"portrait", membre_id:"leo", recurrence:"monthly", recurrence_end:"2026-09-30", notes:"pack famille" }
      ],

        { id: 2, title:"Finir le dossier client", meta:"Travail", done:false, color:"#9ee9c8" },
        { id: 3, title:"Appeler le plombier", meta:"Maison", done:false, color:"#73d9ff" }
      ],

        { id: 1, title:"Lait", qty:"2 bouteilles", color:"#9ce3b2" },
        { id: 2, title:"Pâtes", qty:"3 paquets", color:"#9ce3b2" },
        { id: 3, title:"Pommes", qty:"1 kg", color:"#9ce3b2" }
      ],
      health: [
        { id: 1, title:"Rappel ordonnance", meta:"Vendredi 10h", color:"#ffd1c8" },
        { id: 2, title:"Vaccin Emma", meta:"Le 27 avril", color:"#ffd1c8" }
      ],
      messages: [
        { id: 1, title:"Ma famille", text:"Qui s’occupe du barbecue dimanche ?", time:"18:42", color:"#d8b8ff" },
        { id: 2, title:"Groupe voisins", text:"Pierre passe ce soir.", time:"Hier", color:"#d8b8ff" },
        { id: 3, title:"Sophie Martin", text:"Je ramène le dessert.", time:"Ven.", color:"#d8b8ff" }
      ],
      members: [
        { id: "leo", name:"Léo", role:"Créateur du groupe", status:"Actif", color:"#ffd1c8" },
        { id: "julie", name:"Julie", role:"Co-organisatrice", status:"Maison", color:"#ffd1c8" },
        { id: "emma", name:"Emma", role:"Famille", status:"École", color:"#ffd1c8" }
      ]
    };

    function clone(v){ return JSON.parse(JSON.stringify(v)); }
    function loadState() {
      try {
        const raw = localStorage.getItem(storeKey);
        return raw ? JSON.parse(raw) : clone(defaults);
      } catch (e) {
        return clone(defaults);
      }
    }
    function saveState() { localStorage.setItem(storeKey, JSON.stringify(state)); }

    const state = loadState();
    let agendaFilter = "all";
    let monthCursor = new Date(state.selectedDate + "T12:00:00");
    monthCursor.setDate(1);

    const schoolVacations = [
      { s:new Date(2026,1,7),  e:new Date(2026,1,23), n:"Hiver 2026" },
      { s:new Date(2026,3,4),  e:new Date(2026,3,20), n:"Printemps 2026" },
      { s:new Date(2026,6,4),  e:new Date(2026,8,1),  n:"Été 2026" },
      { s:new Date(2026,9,17), e:new Date(2026,10,2), n:"Toussaint 2026" },
      { s:new Date(2026,11,19), e:new Date(2027,0,4), n:"Noël 2026" }
    ];
    let gardeRefA = new Date(2026,0,5);

    const agendaMembers = [{id:"all", nom:"Tous", couleur:"#8fc7ff"}].concat(
      state.members.map(m => ({id:m.id, nom:m.name, couleur:m.color}))
    );

    const monthBig = document.getElementById("agendaBigMonth");
    const yearBig = document.getElementById("agendaBigYear");
    const monthM = document.getElementById("monthLabelM");
    const monthY = document.getElementById("monthLabelY");
    const monthGrid = document.getElementById("monthGrid");
    const selectedDayPanel = document.getElementById("selectedDayPanel");
    const agendaFilters = document.getElementById("agendaFilters");
    const prevMonthBtn = document.getElementById("prevMonthBtn");
    const nextMonthBtn = document.getElementById("nextMonthBtn");
    const monthShell = document.getElementById("monthShell");

    const weekLabelM = document.getElementById("weekLabelM");
    const weekLabelY = document.getElementById("weekLabelY");
    const weekDaysHead = document.getElementById("weekDaysHead");
    const weekGrid = document.getElementById("weekGrid");

    const planningLabelM = document.getElementById("planningLabelM");
    const planningLabelY = document.getElementById("planningLabelY");
    const planningList = document.getElementById("planningList");

    const yearLabelY = document.getElementById("yearLabelY");
    const yearGrid = document.getElementById("yearGrid");

    const sheet = document.getElementById("sheet");
    const sheetBackdrop = document.getElementById("sheetBackdrop");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetContent = document.getElementById("sheetContent");

    const detailPanel = document.getElementById("detailPanel");
    const detailBackdrop = document.getElementById("detailBackdrop");
    const detailContent = document.getElementById("detailContent");

    const eventModalBg = document.getElementById("eventModalBg");

    function pad(n){ return String(n).padStart(2,"0"); }
    function toYMD(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
    function formatTime(time){ return time ? time.replace(":", "h") : "—"; }

    function isVacation(d){
      return schoolVacations.find(v => d >= v.s && d < v.e) || null;
    }

    function getMonday(d){
      const dt = new Date(d);
      const day = dt.getDay();
      dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
      dt.setHours(0,0,0,0);
      return dt;
    }

    function weekType(d){
      const monday = getMonday(d);
      const ref = getMonday(gardeRefA);
      const diffDays = Math.round((monday - ref) / 86400000);
      const diffWeeks = Math.floor(diffDays / 7);
      return Math.abs(diffWeeks % 2) === 0 ? "A" : "B";
    }

    function normalizeEvent(e){
      return {
        id: e.id || Date.now(),
        titre: e.titre || e.title || "",
        date_debut: e.date_debut || e.date || null,
        heure_debut: e.heure_debut || e.time || null,
        date_fin: e.date_fin || e.date || null,
        heure_fin: e.heure_fin || null,
        couleur: e.couleur || e.color || "#8fc7ff",
        lieu: e.lieu || e.place || "",
        notes: e.notes || "",
        type: e.type || "normal",
        membre_id: e.membre_id || null,
        recurrence: e.recurrence || "none",
        recurrence_end: e.recurrence_end || null
      };
    }

    function getSourceEvents(){ return (state.events || []).map(normalizeEvent); }
    function eventMatchesMember(ev){ return agendaFilter === "all" ? true : ev.membre_id === agendaFilter; }

    function eventOccursOn(ev, dateObj){
      const target = toYMD(dateObj);
      const start = ev.date_debut;
      const end = ev.date_fin || ev.date_debut;
      if(!start) return false;

      if(!ev.recurrence || ev.recurrence === "none"){
        return target >= start && target <= end;
      }
      if(ev.recurrence_end && target > ev.recurrence_end) return false;
      if(target < start) return false;

      const startDate = new Date(start + "T00:00:00");
      const current = new Date(target + "T00:00:00");

      if(ev.recurrence === "weekly") return current.getDay() === startDate.getDay();
      if(ev.recurrence === "monthly") return current.getDate() === startDate.getDate();
      if(ev.recurrence === "biweekly_a") return current.getDay() === startDate.getDay() && weekType(current) === "A";
      if(ev.recurrence === "biweekly_b") return current.getDay() === startDate.getDay() && weekType(current) === "B";
      return false;
    }

    function eventsForDay(dateObj){
      return getSourceEvents()
        .filter(eventMatchesMember)
        .filter(ev => eventOccursOn(ev, dateObj))
        .sort((a,b) => (a.heure_debut || "").localeCompare(b.heure_debut || ""));
    }

    function renderAgendaFilters(){
      agendaFilters.innerHTML = agendaMembers.map(m => `
        <button class="agenda-filter-chip ${agendaFilter === m.id ? "active" : ""}" data-filter="${m.id}">
          ${m.nom}
        </button>
      `).join("");
      agendaFilters.querySelectorAll("[data-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          agendaFilter = btn.dataset.filter;
          renderAgendaFilters();
          rerenderAllAgenda();
        });
      });
    }

    function renderMonthHeaders(){
      const mLabel = monthCursor.toLocaleDateString("fr-FR",{month:"long"});
      const yLabel = monthCursor.getFullYear();
      monthBig.textContent = mLabel.charAt(0).toUpperCase() + mLabel.slice(1);
      yearBig.textContent = yLabel;
      monthM.textContent = mLabel.charAt(0).toUpperCase() + mLabel.slice(1);
      monthY.textContent = yLabel;
      planningLabelM.textContent = "Planning";
      planningLabelY.textContent = yLabel;
      yearLabelY.textContent = yLabel;
    }

    function renderMonthGrid(){
      const y = monthCursor.getFullYear();
      const m = monthCursor.getMonth();
      const first = new Date(y, m, 1);
      const firstOffset = (first.getDay() + 6) % 7;
      const dim = new Date(y, m + 1, 0).getDate();
      const prevDim = new Date(y, m, 0).getDate();
      const today = new Date(); today.setHours(0,0,0,0);

      let html = "";
      for(let i=0; i<firstOffset; i++){
        const d = prevDim - firstOffset + 1 + i;
        html += `<div class="month-cell muted"><span class="month-day-number">${d}</span></div>`;
      }

      for(let d=1; d<=dim; d++){
        const dt = new Date(y, m, d); dt.setHours(0,0,0,0);
        const ymd = toYMD(dt);
        const selected = state.selectedDate === ymd;
        const isToday = sameDay(dt, today);
        const vac = isVacation(dt);
        const weekAB = weekType(dt);
        const dayEvents = eventsForDay(dt);

        let cls = "month-cell";
        if(selected) cls += " selected";
        else cls += weekAB === "A" ? " week-a" : " week-b";
        if(isToday) cls += " today";

        const dots = dayEvents.slice(0,3).map(ev => `<i style="background:${ev.couleur}"></i>`).join("");
        const more = dayEvents.length > 3 ? `<div class="month-more">+${dayEvents.length - 3}</div>` : "";
        const vacLabel = vac ? `<div class="month-vac-label">vac.</div>` : "";

        html += `
          <div class="${cls}" data-date="${ymd}">
            <span class="month-day-number">${d}</span>
            ${vacLabel}
            ${dots ? `<div class="month-dots">${dots}</div>` : `<div class="month-dots"></div>`}
            ${more}
          </div>
        `;
      }

      const totalCells = firstOffset + dim;
      const remain = (7 - (totalCells % 7)) % 7;
      for(let i=1; i<=remain; i++){
        html += `<div class="month-cell muted"><span class="month-day-number">${i}</span></div>`;
      }

      monthGrid.innerHTML = html;
      monthGrid.querySelectorAll("[data-date]").forEach(cell => {
        cell.addEventListener("click", () => {
          state.selectedDate = cell.dataset.date;
          saveState();
          renderMonthGrid();
          renderSelectedDayPanel();
          renderWeekView();
          renderPlanningView();
        });
      });
    }

    function renderSelectedDayPanel(){
      const d = new Date(state.selectedDate + "T12:00:00");
      const list = eventsForDay(d);
      const vac = isVacation(d);
      const dateLabel = d.toLocaleDateString("fr-FR",{weekday:"long", day:"numeric", month:"long"});
      let html = `<div class="selected-day-title">${dateLabel.charAt(0).toUpperCase() + dateLabel.slice(1)}</div>`;

      if(vac){
        html += `
          <div class="selected-day-event">
            <span class="dot" style="background:#EDB777"></span>
            <span class="selected-day-time">Journée</span>
            <div class="selected-day-main">
              <div class="selected-day-name">${vac.n}</div>
              <div class="selected-day-meta">Vacances scolaires</div>
            </div>
            <span class="selected-day-type">Vacances</span>
          </div>
        `;
      }

      if(!list.length && !vac){
        html += `<div class="selected-day-empty">Aucun rendez-vous pour ce jour</div>`;
      } else {
        html += list.map(ev => `
          <div class="selected-day-event" data-open-event="${ev.id}">

    function renderWeekView(){
      const base = new Date(state.selectedDate + "T12:00:00");
      const monday = getMonday(base);
      weekLabelM.textContent = "Semaine";
      weekLabelY.textContent = `${monday.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})} → ${new Date(monday.getFullYear(), monday.getMonth(), monday.getDate()+6).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})}`;

      const days = [];
      for(let i=0;i<7;i++){
        const d = new Date(monday);
        d.setDate(d.getDate()+i);
        days.push(d);
      }

      weekDaysHead.innerHTML = days.map(d => `
        <div class="week-day-head ${toYMD(d)===state.selectedDate ? "active" : ""}">
          ${d.toLocaleDateString("fr-FR",{weekday:"short"})}<br>${d.getDate()}
        </div>
      `).join("");

      const slots = [];
      for(let h=8;h<=20;h+=2) slots.push(h);

      let leftCol = `<div class="week-time-col">${slots.map(h => `<div class="week-time-slot">${String(h).padStart(2,"0")}h</div>`).join("")}</div>`;
      let cols = days.map(d => {
        const evs = eventsForDay(d);
        return `
          <div class="week-col">
            ${slots.map(h => {
              const slotEvents = evs.filter(ev => {
                if(!ev.heure_debut) return false;
                const hh = parseInt(ev.heure_debut.split(":")[0],10);
                return hh >= h && hh < h+2;
              });
              return `
                <div class="week-cell">
                  ${slotEvents.map(ev => `
                    <div class="week-event" data-open-event="${ev.id}" style="background:${ev.couleur}">
                      ${ev.titre}
                      <small>${formatTime(ev.heure_debut)}</small>
                    </div>
                  `).join("")}
                </div>
              `;
            }).join("")}
          </div>
        `;
      }).join("");

      weekGrid.innerHTML = leftCol + cols;

      weekGrid.querySelectorAll("[data-open-event]").forEach(el => {
        el.addEventListener("click", () => openEventDetail(el.dataset.openEvent));
      });
    }

    function renderPlanningView(){
      const y = monthCursor.getFullYear();
      const m = monthCursor.getMonth();
      const dim = new Date(y, m+1, 0).getDate();

      let html = "";
      for(let d=1; d<=dim; d++){
        const dt = new Date(y, m, d);
        const evs = eventsForDay(dt);
        const vac = isVacation(dt);
        if(!evs.length && !vac) continue;

        html += `<div class="planning-day"><div class="planning-day-title">${dt.toLocaleDateString("fr-FR",{weekday:"long", day:"numeric", month:"long"})}</div>`;

        if(vac){
          html += `
            <div class="planning-event">
              <span class="dot" style="background:#EDB777"></span>
              <span class="selected-day-time">Journée</span>
              <div class="selected-day-main">
                <div class="selected-day-name">${vac.n}</div>
                <div class="selected-day-meta">Vacances scolaires</div>
              </div>
              <span class="selected-day-type">Vacances</span>
            </div>
          `;
        }

        html += evs.map(ev => `
          <div class="planning-event" data-open-event="${ev.id}">
            <span class="dot" style="background:${ev.couleur}"></span>
            <span class="selected-day-time">${formatTime(ev.heure_debut)}</span>
            <div class="selected-day-main">
              <div class="selected-day-name">${ev.titre}</div>
              <div class="selected-day-meta">${ev.lieu || ""}</div>
            </div>
            <span class="selected-day-type">${ev.type}</span>
          </div>
        `).join("");

        html += `</div>`;
      }

      planningList.innerHTML = html || `<div class="selected-day-empty">Aucun événement ce mois-ci</div>`;

      planningList.querySelectorAll("[data-open-event]").forEach(el => {
        el.addEventListener("click", () => openEventDetail(el.dataset.openEvent));
      });
    }

    function renderYearView(){
      const year = monthCursor.getFullYear();
      yearLabelY.textContent = year;
      let html = "";

      for(let m=0;m<12;m++){
        const first = new Date(year, m, 1);
        const firstOffset = (first.getDay() + 6) % 7;
        const dim = new Date(year, m+1, 0).getDate();
        const prevDim = new Date(year, m, 0).getDate();
        let cells = "";

        for(let i=0;i<firstOffset;i++){
          const d = prevDim - firstOffset + 1 + i;
          cells += `<div class="mini-day muted">${d}</div>`;
        }

        for(let d=1; d<=dim; d++){
          const dt = new Date(year, m, d);
          const has = eventsForDay(dt).length > 0 || !!isVacation(dt);
          cells += `<div class="mini-day ${has ? "has" : ""}" data-year-month="${m}" data-year-day="${d}">${d}</div>`;
        }

        const total = firstOffset + dim;
        const rem = (7 - (total % 7)) % 7;
        for(let i=1;i<=rem;i++) cells += `<div class="mini-day muted">${i}</div>`;

        html += `
          <div class="mini-month" data-open-month="${m}">
            <div class="mini-month-title">${new Date(year,m,1).toLocaleDateString("fr-FR",{month:"long"})}</div>
            <div class="mini-weekdays"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div>
            <div class="mini-grid">${cells}</div>
          </div>
        `;
      }

      yearGrid.innerHTML = html;

      yearGrid.querySelectorAll("[data-open-month]").forEach(el => {
        el.addEventListener("click", () => {
          const m = Number(el.dataset.openMonth);
          monthCursor = new Date(year, m, 1);
          setActiveView("month");
          rerenderAllAgenda();
        });
      });

      yearGrid.querySelectorAll("[data-year-month][data-year-day]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const m = Number(el.dataset.yearMonth);
          const d = Number(el.dataset.yearDay);
          state.selectedDate = `${year}-${pad(m+1)}-${pad(d)}`;
          monthCursor = new Date(year, m, 1);
          saveState();
          setActiveView("month");
          rerenderAllAgenda();
        });
      });
    }

    function addSwipe(el, onLeft, onRight){
      let sx = 0, sy = 0, moved = false;
      el.addEventListener("touchstart", e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; moved = false; }, { passive:true });
      el.addEventListener("touchmove", e => {
        const dx = Math.abs(e.touches[0].clientX - sx);
        const dy = Math.abs(e.touches[0].clientY - sy);
        if(dx > dy && dx > 10) moved = true;
      }, { passive:true });
      el.addEventListener("touchend", e => {
        if(!moved) return;
        const dx = e.changedTouches[0].clientX - sx;
        const dy = Math.abs(e.changedTouches[0].clientY - sy);
        if(Math.abs(dx) > 55 && dy < 80){ dx < 0 ? onLeft() : onRight(); }
      }, { passive:true });
    }

          saveState();
          openSheet("Tâches", renderTasksSheet());
        });

    function openEventModal(id = null, prefillDate = null){
      const chips = document.getElementById("ev-member-chips");
      const nd = prefillDate || state.selectedDate;

      chips.innerHTML = modalMembers.map((m, i) => `
        <button class="ev-chip ${i===0 ? "sel" : ""}" data-mid="${m.id}" onclick="selMemChip(this)">
          ${m.nom}

          document.getElementById("edd").value = e.date || nd;
          document.getElementById("ehd").value = e.time || "";

          document.getElementById("ehf").value = e.heure_fin || "";

          document.getElementById("erecur-end").value = e.recurrence_end || "";

          if(e.membre_id){
            document.querySelectorAll(".ev-chip").forEach(c => {
              c.classList.toggle("sel", c.dataset.mid === e.membre_id);
            });
          }

          const typeBtn = document.querySelector(`.ev-type-btn[data-type="${e.type || 'normal'}"]`);
          if(typeBtn) selEvType(typeBtn);
        }
      } else {
        document.getElementById("ett").value = "";
        document.getElementById("edd").value = nd;
        document.getElementById("ehd").value = "";
        document.getElementById("edf").value = nd;
        document.getElementById("ehf").value = "";
        document.getElementById("enot").value = "";
        document.getElementById("elieu").value = "";
        document.getElementById("etype").value = "normal";

    function selEvType(btn){
      const type = btn.dataset.type;
      document.getElementById("etype").value = type;
      const hdr = document.getElementById("ev-header");
      const saveBtn = document.getElementById("ev-save-btn");
      const conf = TYPE_HEADERS[type] || TYPE_HEADERS.normal;
      hdr.style.background = conf.bg;
      saveBtn.style.background = conf.bg;
      document.querySelectorAll(".ev-type-btn").forEach(b => b.classList.toggle("active", b === btn));

      const start = document.getElementById("edd").value;
      if(start){
        const d = new Date(start + "T00:00:00");
        if(type === "mariage"){
          d.setDate(d.getDate() + 1);
          document.getElementById("edf").value = toYMD(d);
        } else if(type === "portrait"){
          document.getElementById("edf").value = start;
          const hd = document.getElementById("ehd").value;
          if(hd){
            const [h, m] = hd.split(":").map(Number);
            document.getElementById("ehf").value = String(Math.min(h + 2, 23)).padStart(2,"0") + ":" + String(m).padStart(2,"0");
          }
        } else {
          document.getElementById("edf").value = start;
        }
      }
    }

    function saveEv(){
      const t = document.getElementById("ett").value.trim();
      if(!t){ alert("Titre requis"); return; }

      const selChip = document.querySelector(".ev-chip.sel");
      const memId = selChip ? selChip.dataset.mid : "";

      const type = document.getElementById("etype").value;
      const recur = document.getElementById("erecur").value || "none";
      const recurEnd = document.getElementById("erecur-end").value || null;

      const typeColors = {
        garde_papa:"#2D9E8E",
        garde_partage:"#9B7FD4",
        vacances:"#F5A623",
        mariage:"#C9A96E",
        portrait:"#6B8FA3",
        normal:"#8fc7ff"
      };

      const payload = {
        id: document.getElementById("eid").value || Date.now(),
        title: t,
        date: document.getElementById("edd").value,
        time: document.getElementById("ehd").value || null,
        date_fin: document.getElementById("edf").value || document.getElementById("edd").value,
        heure_fin: document.getElementById("ehf").value || null,
        color: typeColors[type] || "#8fc7ff",
        notes: document.getElementById("enot").value || null,
        place: document.getElementById("elieu").value || null,
        type,
        membre_id: memId || null,
        recurrence: recur,
        recurrence_end: recur !== "none" ? recurEnd : null
      };

      const existingIndex = state.events.findIndex(x => String(x.id) === String(payload.id));
      if(existingIndex >= 0) state.events[existingIndex] = payload;
      else state.events.push(payload);

      saveState();
      rerenderAllAgenda();
      closeEventModal();
    }

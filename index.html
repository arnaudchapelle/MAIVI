<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maivi</title>

<style>
body{
  margin:0;
  font-family:-apple-system, system-ui;
  background:linear-gradient(to bottom, #ffffff, #79aee6);
  color:#2e5aa7;
}

/* GLOBAL */
.container{
  padding:40px 20px 120px;
  max-width:420px;
  margin:auto;
}

/* LOGO */
.logo{
  text-align:center;
  font-size:64px;
  font-weight:800;
  letter-spacing:-2px;
  color:#dff0ff;
  text-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.subtitle{
  text-align:center;
  margin-top:10px;
  opacity:0.6;
}

/* GREETING */
.greeting{
  text-align:center;
  margin:40px 0;
}

.greeting h2{
  margin:0;
  font-size:28px;
}

.greeting p{
  margin-top:8px;
  opacity:0.7;
}

/* CALENDAR */
.calendar{
  margin-top:20px;
  text-align:center;
}

.month{
  font-size:22px;
  margin-bottom:20px;
}

.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
}

.day{
  padding:10px 0;
  font-size:16px;
}

.active{
  background:radial-gradient(circle,#6fd3ff,#2a90ff);
  color:white;
  border-radius:50%;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

/* EVENTS */
.events{
  margin-top:50px;
}

.events h3{
  margin-bottom:20px;
}

.event{
  display:flex;
  align-items:center;
  margin-bottom:20px;
  font-size:18px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:12px;
}

.blue{background:#6fd3ff;}
.green{background:#8df5c2;}
.purple{background:#c6a8ff;}

/* NAV BAR */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:420px;
  height:70px;

  display:flex;
  justify-content:space-around;
  align-items:center;

  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:40px;
}

.nav button{
  background:none;
  border:none;
  font-size:24px;
  opacity:0.6;
}

.nav .center{
  font-size:36px;
  opacity:1;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">maivi</div>
  <div class="subtitle">ma maison - ma vie</div>

  <div class="greeting">
    <h2>Salut Léo</h2>
    <p>Aujourd’hui est calme</p>
  </div>

  <div class="calendar">
    <div class="month">Avril 2024</div>

    <div class="days">
      <div class="day">21</div>
      <div class="day">22</div>
      <div class="day">23</div>
      <div class="day active">24</div>
      <div class="day">25</div>
      <div class="day">26</div>
      <div class="day">27</div>
    </div>
  </div>

  <div class="events">
    <h3>Aujourd’hui</h3>

    <div class="event">
      <div class="dot blue"></div>
      14h — Shooting mariage
    </div>

    <div class="event">
      <div class="dot green"></div>
      16h — Appel client
    </div>

    <div class="event">
      <div class="dot purple"></div>
      19h — Dîner famille
    </div>

  </div>

</div>

<div class="nav">
  <button>⌂</button>
  <button>✓</button>
  <button class="center">+</button>
  <button>💬</button>
  <button>👤</button>
</div>

</body>
</html>
